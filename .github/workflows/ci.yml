name: DevOps Automation CI/CD Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Build, Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Flake8 Code Linting
        run: |
          python -m flake8 app tests

      - name: Run Pytest Unit Tests
        run: |
          python -m pytest

      - name: Run Application Execution Check
        run: |
          python app/main.py

      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "### 🚀 DevOps Automation Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Python Version**: \`${{ matrix.python-version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: \`$GITHUB_REPOSITORY\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`$GITHUB_REF_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`$GITHUB_SHA\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger Event**: \`$GITHUB_EVENT_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Automation tests completed!" >> $GITHUB_STEP_SUMMARY